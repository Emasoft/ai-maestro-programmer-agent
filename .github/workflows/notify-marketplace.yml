# Notify marketplace repo when this plugin is updated
#
# SETUP INSTRUCTIONS:
# 1. Create a Personal Access Token (PAT):
#    - Go to GitHub Settings > Developer settings > Personal access tokens > Tokens (classic)
#    - Click "Generate new token (classic)"
#    - Give it a descriptive name like "Plugin Marketplace Notification"
#    - Select scope: 'repo' (Full control of private repositories)
#    - Click "Generate token" and COPY the token (you won't see it again!)
#
# 2. Add the PAT as a secret to THIS plugin repository:
#    - Go to your plugin repo > Settings > Secrets and variables > Actions
#    - Click "New repository secret"
#    - Name: MARKETPLACE_DISPATCH_TOKEN
#    - Value: paste the PAT you copied in step 1
#    - Click "Add secret"
#
# 3. Enable the workflow:
#    - Change `if: false` to `if: true` on the notify job below
#
# IMPORTANT: Do NOT use GITHUB_TOKEN - it lacks permissions to trigger workflows in other repos!

name: Notify Marketplace

on:
  push:
    branches: [main]
    paths:
      - '.claude-plugin/plugin.json'

jobs:
  notify:
    if: false  # DISABLED: Set to true after configuring MARKETPLACE_DISPATCH_TOKEN secret
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from plugin.json
        id: version
        run: |
          VERSION=$(jq -r '.version' .claude-plugin/plugin.json)
          NAME=$(jq -r '.name' .claude-plugin/plugin.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Notify marketplace
        uses: peter-evans/repository-dispatch@ff45666b9427631e3450c54a1bcbee4d9ff4d7c0 # v3
        with:
          token: ${{ secrets.MARKETPLACE_DISPATCH_TOKEN }}
          repository: Emasoft/ai-maestro-plugins
          event-type: plugin-version-update
          client-payload: '{"plugin_name": "${{ steps.version.outputs.name }}", "version": "${{ steps.version.outputs.version }}"}'

      - name: Summary
        run: |
          echo "## Marketplace Notification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Triggered update in Emasoft/ai-maestro-plugins" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Plugin: ${{ steps.version.outputs.name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Version: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
