name: Plugin Validation

on:
  push:
    branches: [main, master]
    paths:
      - '.claude-plugin/**'
      - 'agents/**'
      - 'commands/**'
      - 'skills/**'
      - 'hooks/**'
      - 'scripts/**'
      - 'rules/**'
      - '*.mcp.json'
      - '.lsp.json'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run CPV validation
        run: |
          echo "=== CPV Plugin Validation ==="
          set +e
          uvx --from git+https://github.com/Emasoft/claude-plugins-validation --with pyyaml cpv-validate . --verbose --report validation-report.md
          EXIT_CODE=$?
          set -e

          # Exit codes: 0=PASS, 1=CRITICAL, 2=MAJOR, 3=MINOR
          # Quality gate: ONLY exit 0 passes. All issues block.
          if [ $EXIT_CODE -eq 0 ]; then
            echo "=== Validation PASSED ==="
          else
            echo "=== BLOCKED: Validation issues found (exit $EXIT_CODE) ==="
            cat validation-report.md 2>/dev/null || true
            exit $EXIT_CODE
          fi

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: validation-report.md
          if-no-files-found: ignore

      - name: Summary
        if: always()
        run: |
          echo "## Plugin Validation" >> $GITHUB_STEP_SUMMARY
          if [ -f validation-report.md ]; then
            cat validation-report.md >> $GITHUB_STEP_SUMMARY
          fi
