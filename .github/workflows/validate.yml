name: Plugin Validation

on:
  push:
    branches: [main, master]
    paths:
      - '.claude-plugin/**'
      - 'agents/**'
      - 'commands/**'
      - 'skills/**'
      - 'hooks/**'
      - 'scripts/**'
      - '*.mcp.json'
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@0ca8f610542aa7f4acaf39e65cf4eb3c35091883 # v7

      - name: Sync CPV validation scripts
        run: |
          echo "=== Syncing validation scripts from CPV ==="
          if [ -f "scripts/sync_cpv_scripts.py" ]; then
            python scripts/sync_cpv_scripts.py || echo "WARNING: CPV sync failed. Using committed scripts."
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Validate plugin
        run: |
          echo "=== Plugin Validation ==="
          echo ""

          # Check that validator script exists
          if [ ! -f "scripts/validate_plugin.py" ]; then
            echo "ERROR: scripts/validate_plugin.py not found"
            exit 1
          fi

          # Run validator with pyyaml dependency
          # Exit codes: 0=pass, 1=CRITICAL, 2=MAJOR, 3=MINOR
          # CI blocks on CRITICAL (1) and MAJOR (2); MINOR (3) passes with warning
          set +e
          uv run --with pyyaml python scripts/validate_plugin.py . --verbose
          exit_code=$?
          set -e

          echo ""
          if [ $exit_code -eq 0 ]; then
            echo "=== Validation PASSED ==="
            exit 0
          elif [ $exit_code -le 2 ]; then
            echo "=== Validation FAILED: $([ $exit_code -eq 1 ] && echo 'CRITICAL' || echo 'MAJOR') issues found ==="
            exit $exit_code
          else
            echo "=== Validation PASSED with MINOR issues (exit code: $exit_code) ==="
            exit 0
          fi
